version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
  
  - name: stg_sessions
    columns:
      - name: session_id
        tests:
          - unique
          - not_null
  
  - name: stg_campaigns
    columns:
      - name: campaign_id
        tests:
          - unique
          - not_null 

  - name: stg_orders
    columns: 
      - name: order_id
        tests:
          - unique
          - not_null 

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id